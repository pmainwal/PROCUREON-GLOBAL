<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Procureon Global</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;

    /* FIXED BACKGROUND ISSUE */
    background: url('assets/bg1.png') no-repeat center center;
    background-size: contain;   /* shows full image */
    background-color: #0b0f1a;  /* fills empty space */
    
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* DARK OVERLAY */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 1;
  }

  /* LOGO TOP LEFT */
  .logo {
    position: fixed;
    top: 20px;
    left: 30px;
    width: 120px;
    z-index: 3;
  }

  /* MAIN CONTENT CENTER */
  .container {
    position: relative;
    z-index: 2;
    max-width: 600px;
    margin: auto;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1.2s ease;
  }

  h1 {
    font-size: 34px;
    color: #d4af37;
    margin-bottom: 10px;
  }

  p {
    color: #ccc;
    font-size: 16px;
    line-height: 1.6;
  }

  /* WHATSAPP BUTTON */
  .cta {
    margin-top: 25px;
    display: inline-block;
    padding: 14px 28px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
  }

  .cta:hover {
    background: #1ebe5d;
  }

  /* BACK LINK */
  .back {
    display: block;
    margin-top: 15px;
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
  }

  .back:hover {
    color: #fff;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MOBILE OPTIMIZATION */
  @media (max-width: 768px) {
    body {
      background-size: cover; /* better for mobile */
    }

    .logo {
      width: 90px;
      top: 15px;
      left: 15px;
    }

    h1 {
      font-size: 26px;
    }
  }
</style>
</head>

<body>

<div class="overlay"></div>

<!-- LOGO -->
<img src="assets/logo.png" alt="Procureon Global" class="logo">

<!-- CONTENT -->
<div class="container">

  <h1>Thank You</h1>

  <p>Your enquiry has been successfully submitted.</p>
  <p>Our team will contact you within <strong>24 hours</strong>.</p>

  <!-- WHATSAPP CTA -->
  <a href="https://wa.me/919834966718?text=Hello%20Procureon%20Global%2C%20I%20have%20submitted%20a%20trade%20enquiry."
     target="_blank"
     class="cta">
     Chat on WhatsApp
  </a>

  <!-- BACK -->
  <a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
