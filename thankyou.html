<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Procureon Global</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    background: url('assets/bg.png') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.75);
  }

  .container {
    position: relative;
    text-align: center;
    max-width: 600px;
    padding: 40px;
    z-index: 2;
    animation: fadeIn 1.5s ease;
  }

  .logo {
    width: 140px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
    color: #d4af37;
  }

  p {
    font-size: 16px;
    color: #ccc;
    line-height: 1.6;
  }

  .cta {
    margin-top: 25px;
    display: inline-block;
    padding: 14px 28px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
  }

  .cta:hover {
    background: #1ebe5d;
  }

  .back {
    display: block;
    margin-top: 15px;
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
  }

  .back:hover {
    color: #fff;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- LOGO -->
  <img src="assets/logo.png" alt="Procureon Global" class="logo">

  <!-- MESSAGE -->
  <h1>Thank You</h1>

  <p>Your enquiry has been successfully submitted.</p>
  <p>Our team will contact you within <strong>24 hours</strong>.</p>

  <!-- WHATSAPP CTA -->
  <a href="https://wa.me/919834966718?text=Hello%20Procureon%20Global%2C%20I%20have%20submitted%20a%20trade%20enquiry." 
     target="_blank" 
     class="cta">
     Chat on WhatsApp
  </a>

  <!-- BACK TO SITE -->
  <a href="index.html" class="back">← Back to Home</a>

</div>

</body>
</html>
